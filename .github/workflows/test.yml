name: Label & Comment Issues and PRs
 
on:

  issues:

    types:

      - opened

      - reopened

      - closed
 
  pull_request_target:

    types:

      - opened

      - reopened
 
jobs:

  manage_activity:

    runs-on: ubuntu-latest
 
    permissions:

      issues: write

      pull-requests: write

      contents: read
 
    steps:

      - name: Attach label to issues

        if: ${{ github.event_name == 'issues' && github.event.action != 'closed' }}

        uses: actions/github-script@v7

        with:

          script: |

            await github.rest.issues.addLabels({

              issue_number: context.issue.number,

              owner: context.repo.owner,

              repo: context.repo.repo,

              labels: ["issue", "fix"]

            });
 
      - name: Comment on new issue

        if: ${{ github.event_name == 'issues' && github.event.action == 'opened' }}

        uses: peter-evans/create-or-update-comment@v4

        with:

          issue-number: ${{ github.event.issue.number }}

          body: |

            Thanks for opening this issue! We'll take a look as soon as possible.
 
      - name: Comment on closed issue

        if: ${{ github.event_name == 'issues' && github.event.action == 'closed' }}

        uses: peter-evans/create-or-update-comment@v4

        with:

          issue-number: ${{ github.event.issue.number }}

          body: |

            This issue has been closed. If you think this is incorrect, feel free to reopen it.
 
      - name: Comment on pull request

        if: ${{ github.event_name == 'pull_request_target' && github.event.action == 'opened' }}

        uses: peter-evans/create-or-update-comment@v4

        with:

          issue-number: ${{ github.event.pull_request.number }}

          body: |

            Thanks for your pull request!

            We really appreciate your contribution and will review it soon.
 
